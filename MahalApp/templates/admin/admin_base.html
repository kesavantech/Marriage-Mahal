{% extends 'base.html' %}

{% block main_class %}p-0{% endblock %}

{% block content %}

<div style="display:flex; min-height:100vh;">

    <!-- SIDEBAR -->
    <div style="width:240px; min-width:240px; background:linear-gradient(180deg, #1a1a2e 0%, #0f3460 100%); display:flex; flex-direction:column;">

        <!-- Brand -->
        <div style="padding:24px 20px 20px; border-bottom:1px solid rgba(255,255,255,0.08); text-align:center;">
            <div style="font-size:32px; color:#e2b96f; margin-bottom:8px;">
                <i class="fas fa-gopuram"></i>
            </div>
            <div style="color:#e2b96f; font-weight:700; font-size:13px; letter-spacing:1px; line-height:1.4;">
                Muthukumaran<br>Mahal
            </div>
        </div>

        <!-- User Info -->
        <div style="padding:16px 20px; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; gap:10px;">
            <div style="width:36px; height:36px; border-radius:50%; background:#e2b96f; display:flex; align-items:center; justify-content:center; font-weight:700; color:#1a1a2e; font-size:14px;">
                {{ request.user.username|first|upper }}
            </div>
            <div>
                <div style="color:#fff; font-size:13px; font-weight:600;">{{ request.user.username }}</div>
                <div style="color:#adb5bd; font-size:11px;">Admin</div>
            </div>
        </div>

        <!-- Nav Links -->
        <nav style="padding:16px 12px; flex:1;">

            <a href="{% url 'dashboard' %}" style="display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; color:#ced4da; text-decoration:none; font-size:14px; margin-bottom:4px;"
               onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#fff';"
               onmouseout="this.style.background='transparent'; this.style.color='#ced4da';">
                <i class="fas fa-home" style="width:16px; color:#e2b96f;"></i> Dashboard
            </a>

            <a href="{% url 'home_slider' %}" style="display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; color:#ced4da; text-decoration:none; font-size:14px; margin-bottom:4px;"
               onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#fff';"
               onmouseout="this.style.background='transparent'; this.style.color='#ced4da';">
                <i class="fas fa-sliders-h" style="width:16px; color:#e2b96f;"></i> Home Slider
            </a>

            <a href="{% url 'home_banner' %}" style="display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; color:#ced4da; text-decoration:none; font-size:14px; margin-bottom:4px;"
               onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#fff';"
               onmouseout="this.style.background='transparent'; this.style.color='#ced4da';">
                <i class="fas fa-image" style="width:16px; color:#e2b96f;"></i> Home Banner
            </a>

            <a href="{% url 'users' %}" style="display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; color:#ced4da; text-decoration:none; font-size:14px; margin-bottom:4px;"
               onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#fff';"
               onmouseout="this.style.background='transparent'; this.style.color='#ced4da';">
                <i class="fas fa-users" style="width:16px; color:#e2b96f;"></i> User List
            </a>

            <a href="{% url 'add_manager' %}" style="display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; color:#ced4da; text-decoration:none; font-size:14px; margin-bottom:4px;"
               onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#fff';"
               onmouseout="this.style.background='transparent'; this.style.color='#ced4da';">
                <i class="fas fa-user-plus" style="width:16px; color:#e2b96f;"></i> Add Manager
            </a>

        </nav>

        <!-- Logout -->
        <div style="padding:12px; border-top:1px solid rgba(255,255,255,0.08);">
            <a href="{% url 'logout' %}" style="display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; color:#ced4da; text-decoration:none; font-size:14px;"
               onmouseover="this.style.background='rgba(220,53,69,0.15)'; this.style.color='#ff6b6b';"
               onmouseout="this.style.background='transparent'; this.style.color='#ced4da';">
                <i class="fas fa-sign-out-alt" style="width:16px; color:#e2b96f;"></i> Logout
            </a>
        </div>

    </div>

    <!-- MAIN CONTENT -->
    <div style="flex:1; background:#f0f2f5; overflow-y:auto; padding:32px;">
        {% block admin_content %}{% endblock %}
    </div>

</div>

{% endblock %}
